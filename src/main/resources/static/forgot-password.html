<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f6fb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      color: #1f2937;
      text-align: center;
    }

    .subtitle {
      margin: 0 0 20px;
      color: #6b7280;
      text-align: center;
      font-size: 14px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      color: #374151;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .message {
      margin: 0 0 10px;
      font-size: 13px;
      text-align: center;
      min-height: 16px;
    }

    .error {
      color: #dc2626;
    }

    .success {
      color: #15803d;
    }

    button {
      width: 100%;
      margin-top: 8px;
      border: none;
      background: #2563eb;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #1e4fc7;
    }

    .back-link {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
    }

    .back-link a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Forgot Password</h1>
    <p class="subtitle">Reset your password</p>

    <p id="message" class="message error" aria-live="polite"></p>

    <form id="forgotPasswordForm" novalidate>
      <div class="field">
        <label for="username">User Name</label>
        <input id="username" name="username" type="text" placeholder="Enter your username" required />
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="Enter your registered email" required />
      </div>

      <div class="field">
        <label for="newPassword">New Password</label>
        <input id="newPassword" name="newPassword" type="password" placeholder="Enter new password" required />
      </div>

      <button type="submit">Reset Password</button>
    </form>

    <p class="back-link"><a href="/login.html">Back to Login</a></p>
  </main>

  <script>
    const form = document.getElementById('forgotPasswordForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';
      message.className = 'message error';

      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const newPassword = document.getElementById('newPassword').value;

      if (!username || !email || !newPassword) {
        message.textContent = 'All fields are required.';
        return;
      }

      if (newPassword.length < 8) {
        message.textContent = 'New password must be at least 8 characters.';
        return;
      }

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, newPassword })
        });

        const body = await response.json();

        if (!response.ok) {
          message.textContent = body.message || 'Password reset failed.';
          return;
        }

        message.className = 'message success';
        message.textContent = 'Password updated successfully. Redirecting to login...';
        window.location.href = '/login.html';
      } catch (error) {
        message.textContent = 'Unable to connect to server. Please try again.';
      }
    });
  </script>
</body>
</html>
